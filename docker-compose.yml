version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: proshop-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Overwrite MONGO_URI from .env if needed, but it will use your MongoDB Atlas URI defined in .env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: proshop-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Do not overwrite container's node_modules with local one
    stdin_open: true # Required for React scripts to run properly in Docker
    tty: true
    depends_on:
      - backend
    restart: always

# Optional: If you ever want to run a local MongoDB container instead of MongoDB Atlas,
# you can uncomment the configuration below:
# 
#   mongo:
#     image: mongo:4.4-bionic
#     container_name: proshop-mongo
#     ports:
#       - "27017:27017"
#     volumes:
#       - mongo-data:/data/db
#     restart: always
#
# volumes:
#   mongo-data:
