route:
  receiver: 'telegram-bot'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
- name: 'telegram-bot'
  telegram_configs:
  - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN_HERE' # Thay bot token vào đây
    chat_id: 123456789 # Thay chat ID vào đây
    message: |-
      🚨 *CẢNH BÁO TỪ HỆ THỐNG PROSHOP* 🚨
      
      *Loại cảnh báo:* {{ .CommonLabels.alertname }}
      *Mức độ:* {{ .CommonLabels.severity }}
      *Thời gian:* {{ .StartsAt }}
      
      *Mô tả:* {{ .CommonAnnotations.description }}
